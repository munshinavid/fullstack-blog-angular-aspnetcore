<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CodePulse</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CodePulse — A modern blog platform built with Angular & ASP.NET Core">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Improvement #1: Google Font (Inter) — modern, clean typeface used by top apps like
       Vercel, Linear, Notion. Replaces the generic browser default font to instantly
       look more professional. 'display=swap' avoids invisible text during font load. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Improvement #9: Bootstrap Icons CDN — provides 2000+ icons (bi-person, bi-calendar, etc.)
       so we can use <i class="bi bi-..."> anywhere without installing an npm package. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <app-root></app-root>
</body>
</html>
