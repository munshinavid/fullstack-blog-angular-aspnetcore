<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h2 class="text-center mb-4 fw-bold" style="color: var(--accent);">Create Account</h2>

          @if (errorMessage()) {
            <div class="alert alert-danger small py-2">
              {{ errorMessage() }}
            </div>
          }

          <form [formGroup]="registerForm" (ngSubmit)="onRegisterSubmit()">
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" formControlName="email" placeholder="name@example.com">
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" formControlName="password" placeholder="At least 6 characters">
            </div>

            <div class="mb-4">
              <label class="form-label">Confirm Password</label>
              <input type="password" class="form-control" formControlName="confirmPassword" placeholder="Repeat password">
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" [disabled]="registerForm.invalid || isSubmitting()">
              @if (isSubmitting()) {
                <span class="spinner-border spinner-border-sm me-2"></span> Creating Account...
              } @else {
                Register
              }
            </button>
          </form>

          <div class="text-center mt-4">
            <p class="small" style="color: var(--text-muted);">
              Already have an account? <a routerLink="/login" class="text-decoration-none">Login here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
