<div class="container mt-4 mb-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0 text-primary">Update Blog Post</h2>
    <a class="btn btn-outline-secondary" [routerLink]="['/admin/blogposts']">
      Back to List
    </a>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <!-- here Image selector Modal will be rendered dynamically when user clicks "Select / Upload Image" button.
        It will emit the selected image URL back to this component, which will then update the featuredImgUrl form control with that URL,
         allowing the user to see a preview of the selected image before submitting the form. -->
      <ng-container #imageSelectorHost></ng-container>

      @if (blogPost()) {
      <form [formGroup]="updateBlogPostForm" (ngSubmit)="onUpdateSubmit()">

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Title</label>
            <input type="text" class="form-control" formControlName="title" placeholder="Update post title">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">URL Handle</label>
            <input type="text" class="form-control" formControlName="urlHandle" placeholder="e.g., updated-post-handle">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Author</label>
            <input type="text" class="form-control" formControlName="author" placeholder="Author name">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Published Date</label>
            <input type="date" class="form-control" formControlName="publishedDate">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Featured Image URL</label>
          <input type="text" class="form-control" formControlName="featuredImgUrl" placeholder="https://...">
          <div class="mt-2">
            <button type="button" class="btn btn-outline-primary btn-sm" (click)="openImageSelector()">
              Select / Upload Image
            </button>
          </div>
          
          @if (updateBlogPostForm.controls.featuredImgUrl.value) {
            <div class="mt-3 text-center">
              <p class="text-muted small mb-2 text-start">Image Preview:</p>
              <img [src]="updateBlogPostForm.controls.featuredImgUrl.value" 
                   alt="Preview" 
                   class="rounded shadow-sm border img-fluid" 
                   style="max-height: 250px; width: 100%; object-fit: cover;"
                   (error)="onImgError($event)">
            </div>
          }
        </div>

        <div class="mb-3">
          <label class="form-label">Short Description</label>
          <textarea class="form-control" rows="2" formControlName="description" placeholder="A brief summary..."></textarea>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Content</label>
          <div class="NgxEditor__Wrapper border rounded">
            <ngx-editor-menu [editor]="editor" [toolbar]="toolbar"> </ngx-editor-menu>
            <ngx-editor 
              [editor]="editor" 
              formControlName="content" 
              [placeholder]="'Update content here...'"> 
            </ngx-editor>
          </div>
        </div>

        <div class="mb-4 form-check form-switch">
          <input class="form-check-input" type="checkbox" role="switch" id="isVisible" formControlName="isVisible">
          <label class="form-check-label ms-2" for="isVisible">
            Make this post visible (Public)
          </label>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Categories</label>
          <div class="d-flex flex-wrap gap-2">
            @for (category of categoryList(); track category.id) {
              <div class="form-check">
                <input class="form-check-input" 
                       type="checkbox" 
                       [id]="'cat-' + category.id" 
                       [value]="category.id" 
                       [checked]="selectedCategoryIds.includes(category.id.toString())"
                       (change)="onCategoryChange($event)">
                <label class="form-check-label" [for]="'cat-' + category.id">
                  {{ category.name }}
                </label>
              </div>
            }
          </div>
        </div>

        <div class="d-flex justify-content-between">
          <button type="button" class="btn btn-danger px-4" (click)="onDelete()">
            Delete Post
          </button>
          
          <button type="submit" class="btn btn-primary px-4" [disabled]="updateBlogPostForm.invalid || isSubmitting()">
            @if (isSubmitting()) {
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Updating...
            } @else {
              Update Blog Post
            }
          </button>
        </div>

      </form>
      } @else {
        <div class="text-center p-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2">Loading blog post data...</p>
        </div>
      }
    </div>
  </div>
</div>
