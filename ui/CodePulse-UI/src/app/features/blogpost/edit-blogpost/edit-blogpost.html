<!-- Dark edit blogpost form -->
<div class="container mt-4 mb-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0 fw-bold" style="color: var(--accent);">Update Blog Post</h2>
    <a class="btn btn-sm rounded-pill px-3" [routerLink]="['/admin/blogposts']"
       style="border: 1px solid var(--border-color); color: var(--text-secondary);">
      <i class="bi bi-arrow-left me-1"></i>Back to List
    </a>
  </div>

  <div class="card border-0" style="background: var(--bg-card); border: 1px solid var(--border-color) !important;">
    <div class="card-body p-4">
      <ng-container #imageSelectorHost></ng-container>

      @if (blogPost()) {
      <form [formGroup]="updateBlogPostForm" (ngSubmit)="onUpdateSubmit()">

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Title</label>
            <input type="text" class="form-control" formControlName="title" placeholder="Update post title">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">URL Handle</label>
            <input type="text" class="form-control" formControlName="urlHandle" placeholder="e.g., updated-post-handle">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Author</label>
            <input type="text" class="form-control" formControlName="author" placeholder="Author name">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Published Date</label>
            <input type="date" class="form-control" formControlName="publishedDate">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Featured Image URL</label>
          <input type="text" class="form-control" formControlName="featuredImgUrl" placeholder="https://...">
          <div class="mt-2">
            <button type="button" class="btn btn-sm rounded-pill px-3" (click)="openImageSelector()"
                    style="border: 1px solid var(--accent); color: var(--accent);">
              <i class="bi bi-image me-1"></i>Select / Upload Image
            </button>
          </div>
          
          @if (updateBlogPostForm.controls.featuredImgUrl.value) {
            <div class="mt-3 text-center">
              <p class="small mb-2 text-start" style="color: var(--text-muted);">Image Preview:</p>
              <img [src]="updateBlogPostForm.controls.featuredImgUrl.value" 
                   alt="Preview" 
                   class="rounded img-fluid" 
                   style="max-height: 250px; width: 100%; object-fit: cover; border: 1px solid var(--border-color);"
                   (error)="onImgError($event)">
            </div>
          }
        </div>

        <div class="mb-3">
          <label class="form-label">Short Description</label>
          <textarea class="form-control" rows="2" formControlName="description" placeholder="A brief summary..."></textarea>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Content</label>
          <div class="NgxEditor__Wrapper border rounded" style="border-color: var(--border-color) !important;">
            <ngx-editor-menu [editor]="editor" [toolbar]="toolbar"> </ngx-editor-menu>
            <ngx-editor 
              [editor]="editor" 
              formControlName="content" 
              [placeholder]="'Update content here...'"> 
            </ngx-editor>
          </div>
        </div>

        <div class="mb-4 form-check form-switch">
          <input class="form-check-input" type="checkbox" role="switch" id="isVisible" formControlName="isVisible">
          <label class="form-check-label ms-2" for="isVisible">
            Make this post visible (Public)
          </label>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Categories</label>
          <div class="d-flex flex-wrap gap-2">
            @for (category of categoryList(); track category.id) {
              <div class="form-check">
                <input class="form-check-input" 
                       type="checkbox" 
                       [id]="'cat-' + category.id" 
                       [value]="category.id" 
                       [checked]="selectedCategoryIds.includes(category.id.toString())"
                       (change)="onCategoryChange($event)">
                <label class="form-check-label" [for]="'cat-' + category.id">
                  {{ category.name }}
                </label>
              </div>
            }
          </div>
        </div>

        <div class="d-flex justify-content-between">
          <!-- Outline delete — less aggressive -->
          <button type="button" class="btn rounded-pill px-4" (click)="onDelete()"
                  style="border: 1px solid rgba(239,68,68,0.3); color: #fca5a5;">
            <i class="bi bi-trash me-1"></i>Delete Post
          </button>
          
          <button type="submit" class="btn rounded-pill px-4" [disabled]="updateBlogPostForm.invalid || isSubmitting()"
                  style="background: var(--accent); color: #fff; border: none;">
            @if (isSubmitting()) {
              <span class="spinner-border spinner-border-sm me-2" role="status"></span>
              Updating...
            } @else {
              <i class="bi bi-check2 me-1"></i>Update Blog Post
            }
          </button>
        </div>

      </form>
      } @else {
        <div class="text-center p-5">
          <div class="spinner-border" style="color: var(--accent);" role="status"></div>
          <p class="mt-2" style="color: var(--text-muted);">Loading blog post data...</p>
        </div>
      }
    </div>
  </div>
</div>
