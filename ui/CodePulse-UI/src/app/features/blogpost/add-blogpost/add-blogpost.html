<div class="container mt-4 mb-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0 text-primary">Add New Blog Post</h2>
    <a class="btn btn-outline-secondary" [routerLink]="['/admin/blogposts']">
      Back to List
    </a>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <form [formGroup]="addBlogPostForm" (ngSubmit)="onSubmit()">

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Title</label>
            <input type="text" class="form-control" formControlName="title" placeholder="Enter post title">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">URL Handle</label>
            <input type="text" class="form-control" formControlName="urlHandle" placeholder="e.g., my-first-post">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Author</label>
            <input type="text" class="form-control" formControlName="author" placeholder="Author name">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Published Date</label>
            <input type="date" class="form-control" formControlName="publishedDate">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Featured Image URL</label>
          <input type="text" class="form-control" formControlName="featuredImgUrl" placeholder="https://...">
          
          @if (addBlogPostForm.controls.featuredImgUrl.value) {
            <div class="mt-3 text-center">
              <p class="text-muted small mb-2 text-start">Image Preview:</p>
              <img [src]="addBlogPostForm.controls.featuredImgUrl.value" 
                   alt="Preview" 
                   class="rounded shadow-sm border img-fluid" 
                   style="max-height: 250px; width: 100%; object-fit: cover;"
                   (error)="onImgError($event)">
            </div>
          }
        </div>

        <div class="mb-3">
          <label class="form-label">Short Description</label>
          <textarea class="form-control" rows="2" formControlName="description" placeholder="A brief summary of the post..."></textarea>
        </div>

        <div class="mb-4">
        <label class="form-label fw-bold">Content</label>
        
        <div class="NgxEditor__Wrapper border rounded">
          <ngx-editor-menu [editor]="editor" [toolbar]="toolbar"> </ngx-editor-menu>
          
          <ngx-editor 
            [editor]="editor" 
            formControlName="content" 
            [placeholder]="'Type here...'"> 
          </ngx-editor>
        </div>
      </div>

        <div class="mb-4 form-check form-switch">
          <input class="form-check-input" type="checkbox" role="switch" id="isVisible" formControlName="isVisible">
          <label class="form-check-label ms-2" for="isVisible">
            Make this post visible (Public)
          </label>
        </div>

        <!-- <-- give option to select multiple categories -->
        <div class="mb-4">
          <label class="form-label fw-bold">Categories</label>
          <div class="d-flex flex-wrap gap-2">
            @for (category of categoryList(); track category.id) {
              <div class="form-check">
                <input class="form-check-input" type="checkbox" [id]="'cat-' + category.id" [value]="category.id" (change)="onCategoryChange($event)">
                <label class="form-check-label" [for]="'cat-' + category.id">
                  {{ category.name }}
                </label>
              </div>
            }
          </div>
        </div>


        <div class="d-flex justify-content-end">
          <button type="submit" class="btn btn-primary px-4" [disabled]="addBlogPostForm.invalid || isSubmitting()">
            @if (isSubmitting()) {
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Saving...
            } @else {
              Save Blog Post
            }
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
