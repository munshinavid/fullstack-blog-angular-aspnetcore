<!-- Improvement #9: Added 'sticky-top' — keeps navbar visible while scrolling.
     This improves UX because users don't have to scroll back up to navigate. -->
<nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow-sm sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/">Code Pulse</a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        </li>

        @if (user()?.roles?.includes('Admin')) {
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
              Admin Panel
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" routerLink="admin/dashboard">Dashboard</a></li>
              <li><a class="dropdown-item" routerLink="admin/categories">Categories</a></li>
              <li><a class="dropdown-item" routerLink="admin/blogposts">Blog Posts</a></li>
            </ul>
          </li>
        }
      </ul>

      <div class="d-flex align-items-center">
        @if (user()) {
          <span class="text-light me-3 small">Hi, {{ user()?.email }}</span>
          <button class="btn btn-outline-light btn-sm rounded-pill px-3" (click)="onLogout()">Logout</button>
        } 
        @else {
          <a routerLink="/login" class="btn btn-primary btn-sm rounded-pill px-4 me-2">Login</a>
          <a routerLink="/register" class="btn btn-outline-primary btn-sm rounded-pill px-4">Register</a>
        }
      </div>
    </div>
  </div>
</nav>
