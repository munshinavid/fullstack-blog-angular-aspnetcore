version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: codepulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blogdb
      POSTGRES_USER: codepulse_user
      POSTGRES_PASSWORD: codepulse_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codepulse_user -d blogdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api/CodePulse.API
      dockerfile: Dockerfile
    ports:
      - "7071:8080" # ASP.NET Core 8 defaults to port 8080 inside the container
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__BlogsConnectionString=Host=postgres;Port=5432;Database=blogdb;Username=codepulse_user;Password=codepulse_password
    env_file:
      - ./api/CodePulse.API/.env
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: ./ui/CodePulse-UI
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: codepulse-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@myblog.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
